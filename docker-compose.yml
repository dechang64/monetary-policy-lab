version: "3.8"

services:
  mp-lab:
    build: .
    ports:
      - "8501:8501"
    environment:
      - FRED_API_KEY=${FRED_API_KEY:-}
    volumes:
      - ./data/cache:/app/data/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
